<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora IMC — Clínico & Performance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --navy:    #1A3A5C;
    --navy-md: #2A5080;
    --teal:    #0D9488;
    --green:   #16A34A;
    --yellow:  #D97706;
    --orange:  #EA580C;
    --red:     #DC2626;
    --bg:      #F0F4F8;
    --surface: #FFFFFF;
    --border:  #CBD5E1;
    --muted:   #64748B;
    --text:    #0F172A;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
 
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
 
  /* ── HEADER ── */
  header {
    width: 100%;
    background: var(--navy);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { color: #fff; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
  header p  { color: #94A3B8; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; }
 
  /* ── MODE TOGGLE ── */
  .mode-bar {
    width: 100%; max-width: 860px;
    padding: 24px 24px 0;
    display: flex; gap: 0;
  }
  .mode-btn {
    flex: 1; padding: 10px 0;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: var(--sans);
    font-size: 0.82rem; font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .mode-btn:first-child { border-radius: 8px 0 0 8px; }
  .mode-btn:last-child  { border-radius: 0 8px 8px 0; border-left: none; }
  .mode-btn.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
 
  /* ── MAIN LAYOUT ── */
  .main {
    width: 100%; max-width: 860px;
    padding: 20px 24px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
 
  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }
  .card-title {
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 18px;
  }
 
  /* ── INPUTS ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.78rem; font-weight: 600; color: var(--navy);
    margin-bottom: 6px;
  }
  .field-row { display: flex; gap: 10px; align-items: center; }
  .field input[type=number] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 1rem; font-weight: 600;
    color: var(--text);
    background: #F8FAFC;
    outline: none;
    transition: border-color .2s;
    -moz-appearance: textfield;
  }
  .field input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field input[type=number]:focus { border-color: var(--teal); background: #fff; }
  .field-unit {
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
    white-space: nowrap;
    min-width: 28px;
  }
 
  .sex-row { display: flex; gap: 10px; }
  .sex-btn {
    flex: 1; padding: 9px 0;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #F8FAFC;
    font-family: var(--sans);
    font-size: 0.82rem; font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .sex-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
  }
 
  .calc-btn {
    width: 100%; padding: 13px;
    background: var(--navy);
    color: #fff;
    border: none; border-radius: 10px;
    font-family: var(--sans);
    font-size: 0.88rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer;
    margin-top: 4px;
    transition: background .2s;
  }
  .calc-btn:hover { background: var(--navy-md); }
 
  /* ── GAUGE ── */
  .gauge-card { grid-column: 1 / -1; padding: 28px 32px; }
  .gauge-wrap { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
  .gauge-svg { width: 320px; max-width: 100%; }
 
  .imc-display {
    text-align: center;
    margin-top: 4px;
  }
  .imc-value {
    font-family: var(--mono);
    font-size: 3.2rem; font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--navy);
    line-height: 1;
  }
  .imc-class {
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 4px;
  }
 
  /* ── RESULTS GRID ── */
  .results-card { grid-column: 1 / -1; }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .stat-box {
    background: #F8FAFC;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 1.25rem; font-weight: 600;
    color: var(--navy);
  }
  .stat-sub {
    font-size: 0.7rem; color: var(--muted); margin-top: 2px;
  }
 
  /* ── RISK TABLE ── */
  .risk-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 4px; }
  .risk-table th {
    text-align: left; padding: 7px 10px;
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1.5px solid var(--border);
  }
  .risk-table td { padding: 9px 10px; border-bottom: 1px solid #F1F5F9; }
  .risk-table tr:last-child td { border: none; }
  .risk-table tr.highlight td { background: #F0FDF4; font-weight: 600; }
  .dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 7px; vertical-align: middle;
  }
 
  /* ── HIDDEN ── */
  .hidden { display: none !important; }
  .placeholder {
    color: var(--muted); font-size: 0.85rem;
    text-align: center; padding: 20px 0;
  }
 
  /* ── GYM EXTRAS ── */
  #gymExtras .card-title { color: var(--teal); }
  .progress-bar-wrap { margin-top: 6px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .progress-bg { background: #E2E8F0; border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .6s ease; background: var(--teal); }
 
  @media (max-width: 600px) {
    .main { grid-template-columns: 1fr; }
    .gauge-card, .results-card { grid-column: 1; }
  }
</style>
</head>
<body>
 
<header>
  <div class="logo-icon">⚕️</div>
  <div>
    <h1>Calculadora de IMC</h1>
    <p>Clínico &amp; Performance</p>
  </div>
</header>
 
<!-- MODE TOGGLE -->
<div class="mode-bar">
  <button class="mode-btn active" id="btnClinico" onclick="setMode('clinico')">🏥 Modo Clínico</button>
  <button class="mode-btn" id="btnAcademia" onclick="setMode('academia')">🏋️ Modo Academia</button>
</div>
 
<div class="main">
 
  <!-- INPUT CARD -->
  <div class="card">
    <div class="card-title">Dados do Paciente / Atleta</div>
 
    <div class="field">
      <label>Sexo biológico</label>
      <div class="sex-row">
        <button class="sex-btn active" id="btnM" onclick="setSex('M')">♂ Masculino</button>
        <button class="sex-btn" id="btnF" onclick="setSex('F')">♀ Feminino</button>
      </div>
    </div>
 
    <div class="field">
      <label>Idade</label>
      <div class="field-row">
        <input type="number" id="idade" min="5" max="120" placeholder="30">
        <span class="field-unit">anos</span>
      </div>
    </div>
 
    <div class="field">
      <label>Altura</label>
      <div class="field-row">
        <input type="number" id="altura" min="50" max="250" placeholder="175">
        <span class="field-unit">cm</span>
      </div>
    </div>
 
    <div class="field">
      <label>Peso</label>
      <div class="field-row">
        <input type="number" id="peso" min="10" max="400" step="0.1" placeholder="75">
        <span class="field-unit">kg</span>
      </div>
    </div>
 
    <!-- GYM ONLY -->
    <div id="gymInputs" class="hidden">
      <div class="field">
        <label>Circunferência abdominal</label>
        <div class="field-row">
          <input type="number" id="cintura" min="40" max="200" placeholder="88">
          <span class="field-unit">cm</span>
        </div>
      </div>
      <div class="field">
        <label>Circunferência do quadril</label>
        <div class="field-row">
          <input type="number" id="quadril" min="40" max="200" placeholder="95">
          <span class="field-unit">cm</span>
        </div>
      </div>
    </div>
 
    <button class="calc-btn" onclick="calcular()">Calcular IMC</button>
  </div>
 
  <!-- GAUGE CARD -->
  <div class="card gauge-card" id="gaugeCard">
    <div id="gaugeEmpty" class="placeholder">Preencha os dados e clique em Calcular</div>
    <div id="gaugeResult" class="hidden">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 320 180" id="gaugeSvg">
          <defs>
            <linearGradient id="gNeedle" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1A3A5C"/>
              <stop offset="100%" stop-color="#2A5080"/>
            </linearGradient>
          </defs>
          <!-- Arcos de fundo -->
          <!-- Muito baixo (<16) -->
          <path id="arc0" d="" fill="none" stroke="#7DD3FC" stroke-width="22" stroke-linecap="butt"/>
          <!-- Magreza moderada (16-17) -->
          <path id="arc1" d="" fill="none" stroke="#38BDF8" stroke-width="22" stroke-linecap="butt"/>
          <!-- Magreza leve (17-18.5) -->
          <path id="arc2" d="" fill="none" stroke="#34D399" stroke-width="22" stroke-linecap="butt"/>
          <!-- Normal (18.5-24.9) -->
          <path id="arc3" d="" fill="none" stroke="#16A34A" stroke-width="22" stroke-linecap="butt"/>
          <!-- Sobrepeso (25-29.9) -->
          <path id="arc4" d="" fill="none" stroke="#D97706" stroke-width="22" stroke-linecap="butt"/>
          <!-- Obesidade I (30-34.9) -->
          <path id="arc5" d="" fill="none" stroke="#EA580C" stroke-width="22" stroke-linecap="butt"/>
          <!-- Obesidade II (35-39.9) -->
          <path id="arc6" d="" fill="none" stroke="#DC2626" stroke-width="22" stroke-linecap="butt"/>
          <!-- Obesidade III (≥40) -->
          <path id="arc7" d="" fill="none" stroke="#7F1D1D" stroke-width="22" stroke-linecap="butt"/>
          <!-- Agulha -->
          <line id="needle" x1="160" y1="150" x2="160" y2="80"
            stroke="url(#gNeedle)" stroke-width="4" stroke-linecap="round"
            style="transform-origin: 160px 150px; transition: transform .8s cubic-bezier(.22,.61,.36,1)"/>
          <circle cx="160" cy="150" r="7" fill="#1A3A5C"/>
          <circle cx="160" cy="150" r="3" fill="#fff"/>
        </svg>
        <div class="imc-display">
          <div class="imc-value" id="imcValor">—</div>
          <div class="imc-class" id="imcClasse" style="color: var(--navy);">—</div>
        </div>
      </div>
    </div>
  </div>
 
  <!-- STATS CARD -->
  <div class="card results-card" id="statsCard" style="display:none">
    <div class="card-title">Métricas</div>
    <div class="results-grid" id="statsGrid"></div>
  </div>
 
  <!-- GYM EXTRAS -->
  <div class="card hidden" id="gymExtras">
    <div class="card-title" style="color: var(--teal)">Composição &amp; Desempenho</div>
    <div id="gymStatsContent"></div>
  </div>
 
  <!-- RISK TABLE CARD -->
  <div class="card results-card" id="riskCard" style="display:none">
    <div class="card-title">Classificação WHO — Tabela de Referência</div>
    <table class="risk-table" id="riskTable"></table>
  </div>
 
</div>
 
<script>
let currentMode = 'clinico';
let currentSex  = 'M';
 
function setMode(m) {
  currentMode = m;
  document.getElementById('btnClinico').classList.toggle('active', m === 'clinico');
  document.getElementById('btnAcademia').classList.toggle('active', m === 'academia');
  document.getElementById('gymInputs').classList.toggle('hidden', m !== 'academia');
  document.getElementById('gymExtras').classList.add('hidden');
  resetResults();
}
 
function setSex(s) {
  currentSex = s;
  document.getElementById('btnM').classList.toggle('active', s === 'M');
  document.getElementById('btnF').classList.toggle('active', s === 'F');
}
 
function resetResults() {
  document.getElementById('gaugeEmpty').classList.remove('hidden');
  document.getElementById('gaugeResult').classList.add('hidden');
  document.getElementById('statsCard').style.display = 'none';
  document.getElementById('riskCard').style.display  = 'none';
  document.getElementById('gymExtras').classList.add('hidden');
}
 
/* ── GAUGE MATH ── */
const CX = 160, CY = 150, R = 100;
const ARC_START = Math.PI;       // 180°
const ARC_END   = 2 * Math.PI;   // 360°
const ARC_SPAN  = Math.PI;
 
// IMC ← angle mapping: 10 → 0%, 50 → 100%
function imcToAngle(imc) {
  const pct = Math.min(Math.max((imc - 10) / 40, 0), 1);
  return ARC_START + pct * ARC_SPAN;
}
 
function polar(angle) {
  return {
    x: CX + R * Math.cos(angle),
    y: CY + R * Math.sin(angle)
  };
}
 
function arcPath(a1, a2) {
  const p1 = polar(a1), p2 = polar(a2);
  const large = (a2 - a1) > Math.PI ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${R} ${R} 0 ${large} 1 ${p2.x} ${p2.y}`;
}
 
// Bands: [imcMin, imcMax, arcId]
const BANDS = [
  [10,   16,   'arc0'],
  [16,   17,   'arc1'],
  [17,   18.5, 'arc2'],
  [18.5, 25,   'arc3'],
  [25,   30,   'arc4'],
  [30,   35,   'arc5'],
  [35,   40,   'arc6'],
  [40,   50,   'arc7'],
];
 
function drawGauge(imc) {
  BANDS.forEach(([a, b, id]) => {
    const el = document.getElementById(id);
    el.setAttribute('d', arcPath(imcToAngle(a), imcToAngle(b)));
    el.setAttribute('opacity', '0.25');
  });
 
  // highlight band
  BANDS.forEach(([a, b, id]) => {
    if (imc >= a && imc < b) {
      document.getElementById(id).setAttribute('opacity', '1');
    }
  });
  // edge case: ≥40
  if (imc >= 40) document.getElementById('arc7').setAttribute('opacity', '1');
 
  // needle
  const angle = imcToAngle(Math.min(Math.max(imc, 10), 50));
  const deg   = (angle - Math.PI / 2) * (180 / Math.PI);
  document.getElementById('needle').style.transform = `rotate(${deg}deg)`;
}
 
/* ── CLASSIFICATION ── */
const TABLE = [
  { label: 'Magreza Grau III',  min: 0,    max: 16,   cor: '#7DD3FC', risco: 'Muito elevado'  },
  { label: 'Magreza Grau II',   min: 16,   max: 17,   cor: '#38BDF8', risco: 'Elevado'         },
  { label: 'Magreza Grau I',    min: 17,   max: 18.5, cor: '#34D399', risco: 'Elevado'         },
  { label: 'Peso adequado',     min: 18.5, max: 25,   cor: '#16A34A', risco: 'Baixo'            },
  { label: 'Sobrepeso',         min: 25,   max: 30,   cor: '#D97706', risco: 'Moderado'         },
  { label: 'Obesidade Grau I',  min: 30,   max: 35,   cor: '#EA580C', risco: 'Alto'             },
  { label: 'Obesidade Grau II', min: 35,   max: 40,   cor: '#DC2626', risco: 'Muito Alto'       },
  { label: 'Obesidade Grau III',min: 40,   max: 999,  cor: '#7F1D1D', risco: 'Extremamente Alto'},
];
 
function classify(imc) {
  return TABLE.find(t => imc >= t.min && imc < t.max) || TABLE[TABLE.length - 1];
}
 
/* ── DEURENBERG body fat % estimation ── */
function bodyFat(imc, age, sex) {
  // Deurenberg (1991)
  const s = sex === 'M' ? 1 : 0;
  return (1.20 * imc) + (0.23 * age) - (10.8 * s) - 5.4;
}
 
/* ── FAT MASS / LEAN MASS ── */
function composition(peso, fat) {
  const fm  = peso * (fat / 100);
  const lm  = peso - fm;
  return { fm: fm.toFixed(1), lm: lm.toFixed(1) };
}
 
/* ── WAIST-HIP RATIO ── */
function whr(cintura, quadril) {
  return (cintura / quadril).toFixed(2);
}
 
/* ── ABSI (A Body Shape Index) ── */
function absi(cintura, peso, altura) {
  const bmi = peso / ((altura / 100) ** 2);
  return (cintura / 100) / (bmi ** (2 / 3) * (altura / 100) ** 0.5);
}
 
/* ── PESO IDEAL (Lorentz) ── */
function idealWeight(altura, sex) {
  const h = altura - 100;
  return sex === 'M'
    ? h - (h - 150) / 4
    : h - (h - 150) / 2;
}
 
/* ── MAIN CALC ── */
function calcular() {
  const idade  = parseFloat(document.getElementById('idade').value);
  const altura = parseFloat(document.getElementById('altura').value);
  const peso   = parseFloat(document.getElementById('peso').value);
 
  if (!idade || !altura || !peso || altura < 50 || peso < 10 || idade < 1) {
    alert('Por favor, preencha todos os campos corretamente.');
    return;
  }
 
  const h_m = altura / 100;
  const imc  = peso / (h_m * h_m);
  const cls  = classify(imc);
 
  // Show gauge
  document.getElementById('gaugeEmpty').classList.add('hidden');
  document.getElementById('gaugeResult').classList.remove('hidden');
  drawGauge(imc);
 
  document.getElementById('imcValor').textContent = imc.toFixed(1);
  document.getElementById('imcClasse').textContent = cls.label;
  document.getElementById('imcClasse').style.color  = cls.cor;
 
  // Stats
  const fat = bodyFat(imc, idade, currentSex);
  const comp = composition(peso, fat);
  const pi   = idealWeight(altura, currentSex);
  const diff  = (peso - pi).toFixed(1);
  const diffStr = diff > 0 ? `+${diff} kg` : `${diff} kg`;
 
  const stats = [
    { label: 'IMC',              value: imc.toFixed(2),     sub: 'kg/m²'        },
    { label: 'Classificação WHO',value: cls.label,           sub: `Risco: ${cls.risco}` },
    { label: '% Gordura Est.',   value: fat.toFixed(1) + '%', sub: 'Deurenberg 1991' },
    { label: 'Massa Gorda',      value: comp.fm + ' kg',    sub: 'estimada'     },
    { label: 'Massa Magra',      value: comp.lm + ' kg',    sub: 'estimada'     },
    { label: 'Peso Ideal (Lorentz)', value: pi.toFixed(1) + ' kg', sub: `Diferença: ${diffStr}` },
  ];
 
  document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="stat-box">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>
  `).join('');
  document.getElementById('statsCard').style.display = '';
 
  // Risk table
  document.getElementById('riskTable').innerHTML = `
    <tr>
      <th>Classificação</th><th>IMC (kg/m²)</th><th>Risco Cardiovascular</th>
    </tr>
    ${TABLE.map(t => `
      <tr class="${t.label === cls.label ? 'highlight' : ''}">
        <td><span class="dot" style="background:${t.cor}"></span>${t.label}</td>
        <td style="font-family:var(--mono); font-size:.82rem">
          ${t.min} – ${t.max < 999 ? t.max : '≥40'}
        </td>
        <td>${t.risco}</td>
      </tr>
    `).join('')}
  `;
  document.getElementById('riskCard').style.display = '';
 
  // GYM EXTRAS
  if (currentMode === 'academia') {
    const cintura = parseFloat(document.getElementById('cintura').value);
    const quadril  = parseFloat(document.getElementById('quadril').value);
 
    let gymHtml = '';
 
    // Fat % progress bar
    const fatMax = currentSex === 'M' ? 35 : 45;
    const fatPct = Math.min((fat / fatMax) * 100, 100);
    const fatIdeal = currentSex === 'M' ? '10–20%' : '18–28%';
    gymHtml += `
      <div style="margin-bottom:18px">
        <div class="progress-label"><span>% Gordura Corporal</span><span style="font-family:var(--mono);font-weight:600">${fat.toFixed(1)}%</span></div>
        <div class="progress-bg"><div class="progress-fill" style="width:${fatPct}%; background: ${fat < 5 ? '#38BDF8' : fat < (currentSex==='M'?20:28) ? '#16A34A' : fat < (currentSex==='M'?25:35) ? '#D97706' : '#DC2626'}"></div></div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:4px">Ideal (${currentSex==='M'?'homens':'mulheres'}): ${fatIdeal}</div>
      </div>
    `;
 
    if (cintura && quadril) {
      const ratio = whr(cintura, quadril);
      const riskWHR = currentSex === 'M'
        ? (ratio < 0.90 ? 'Baixo' : ratio < 1.0 ? 'Moderado' : 'Alto')
        : (ratio < 0.80 ? 'Baixo' : ratio < 0.85 ? 'Moderado' : 'Alto');
 
      const absiVal = absi(cintura, peso, altura);
 
      gymHtml += `
        <div class="results-grid" style="margin-bottom:0">
          <div class="stat-box">
            <div class="stat-label">Razão Cintura/Quadril</div>
            <div class="stat-value">${ratio}</div>
            <div class="stat-sub">Risco: ${riskWHR}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">ABSI</div>
            <div class="stat-value">${absiVal.toFixed(4)}</div>
            <div class="stat-sub">Índice de forma corporal</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Circ. Abdominal</div>
            <div class="stat-value">${cintura} cm</div>
            <div class="stat-sub">Alerta ♂≥94 ♀≥80 cm</div>
          </div>
        </div>
      `;
    } else {
      gymHtml += `<p style="font-size:.78rem;color:var(--muted)">Insira cintura e quadril para ver métricas avançadas de composição.</p>`;
    }
 
    document.getElementById('gymStatsContent').innerHTML = gymHtml;
    document.getElementById('gymExtras').classList.remove('hidden');
  }
}
</script>
</body>
</html>
